<div th:replace="/user/fragments/header :: header"></div>

<!-- JS
============================================ -->
<!-- Modernizer JS -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
        const myAccount = document.querySelector('.my-account > a');
        if (myAccount) {
        myAccount.addEventListener('click', () => {
        alert('Dropdown kích hoạt thành công!');
    });
    } else {
        console.log('Không tìm thấy phần tử .my-account > a');
    }
    });
        document.addEventListener('DOMContentLoaded', () => {
            const myAccount = document.querySelector('.my-account');
            const dropdown = document.querySelector('.my-account-dropdown');

            if (myAccount && dropdown) {
                myAccount.addEventListener('click', (e) => {
                    e.preventDefault();
                    dropdown.classList.toggle('active');
                    console.log("Dropdown đã bật");  // Kiểm tra console log
                });
            }
        });

    </script>

<script th:src="@{/user/js/vendor/modernizr.min.js}"></script>

<script th:src="@{/user/js/vendor/jquery.js}"></script>
